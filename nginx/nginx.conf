# TODO: add ssl certs and https/http2/hsts once closer to prod 
worker_processes auto; 

events {
  worker_connections 1024; #not expecting many concurrent connections
}

http {

  include /etc/nginx/mime.types;
  default_type application/octet-stream; #sane mime fallback type

  client_max_body_size 1g; # biggest on old app was ~2.5 TB

  charset utf-8;

  client_body_timeout 10m; #allow long uploads
  send_timeout 48h;

  sendfile on; #performance
  tcp_nopush on; # send full packets to reduce network overhead
  tcp_nodelay on; # reduce latency by disabling nagle's algorithm

  server_tokens off; #hide nginx version

  keepalive_timeout 30; # keep alive some connections after disconnect to reduce overhead of opening a new one
  keepalive_requests 100; # allow multiple requests per connection 

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  limit_req_status 429;
  limit_req_log_level warn;

  # gzip compress
  gzip on;
  gzip_vary on;
  gzip_comp_level 5;
  gzip_min_length 1000;
  gzip_types
  text/plain
  text/css
  application/json
  application/javascript
  application/xml
  application/manifest+json
  text/xml
  image/svg+xml
  font/ttf
  application/wasm
  application/rss+xml
  font/woff
  font/woff2;

  etag on; # cache validation allows for 304 not modified as a response 

  server {

    listen 80;

    # listen 443 ssl http2;

    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;

    # ssl_protocols TLSv1.2 TLSv1.3;

    # ssl_prefer_server_ciphers off;

    # add_header Strict-Transport-Security \
    # "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always; #prevent clickjacking change fi we need to embed in an iframe
    add_header X-Content-Type-Options "nosniff" always; # prevent mime sniffing
    add_header Referrer-Policy "strict-origin-when-cross-origin" always; # prevent sending full url in header to other sites
    add_header X-Permitted-Cross-Domain-Policies "none" always; # prevent flash and adobe stuff from loading cross domain data
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always; # disable access to stuff we dont need
    add_header Content-Security-Policy "
      default-src 'self';
      base-uri 'self';
      object-src 'none';
      frame-ancestors 'none';
      frame-src 'none';
      form-action 'self';
      script-src 'self'; 
      style-src 'self'; 
      img-src 'self' data: blob:;
      font-src 'self';
      connect-src 'self';
      manifest-src 'self';
      worker-src 'self' blob:;
    " always; # Check with frontend about inline scripts and styles
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Resource-Policy same-origin always;

    # prevent stale content being served from cache after update
    location = /index.html {
      expires -1;
      add_header Cache-Control "no-cache no-store, must-revalidate";
    }

    location /api/uploadfile/ { # /api/uploadfile/{uuid} is the only one used for large files
      client_max_body_size 3000g;
      proxy_pass http://backend:8000/uploadfile/;

      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;

      proxy_request_buffering off;
      proxy_buffering on;

      proxy_connect_timeout 3m;
      proxy_send_timeout 24h;
      proxy_read_timeout 24h;
    }

    # api docs. disable in prod from main.py and chaneg this to serve 404 
    location /api/docs {
      # return 404;

      proxy_pass http://backend:8000/docs;

      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      add_header Content-Security-Policy "
        default-src 'self';
        base-uri 'self';
        object-src 'none';
        frame-ancestors 'none';
        form-action 'self';
        script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
        img-src 'self' data: blob: https://fastapi.tiangolo.com;
        font-src 'self' https://cdn.jsdelivr.net;
        connect-src 'self';
        manifest-src 'self';
        worker-src 'self' blob:;
      " always;
    }

    # api proxy
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://backend:8000/;

      proxy_http_version 1.1;

      proxy_set_header Host $host; 
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;

      proxy_request_buffering on;
      proxy_buffering on; 

      # websockets if we add them 
      #proxy_set_header Upgrade $http_upgrade;
      #proxy_set_header Connection "upgrade";

      proxy_connect_timeout 3m; #allow long uploads
      proxy_send_timeout 24h; #allow long uploads
      proxy_read_timeout 24h;# allow long uploads
    }

    # cache hashed static react stuff
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
      expires 6M; #effectively permanent caching for hashed static stuff
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # React spa routing and fallback to index.html for non-api routes
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}