networks:
  default:
    ipam:
      config:
        - subnet: 172.29.0.0/16 # non-overlapping subnet for docker network to avoid conflicts with host network

services:
  backend:
    build:
      context: ./backend
    expose: # not published to host
      - "8000"
    volumes:
    - ./storage:/app/storage
    restart: unless-stopped
    environment: # Move from env variables to azure key vault later
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      TENANT_ID: ${TENANT_ID}
      CLIENT_ID: ${CLIENT_ID}
      BACKEND_URL: ${BACKEND_URL}
      TESTING: ${TESTING}
      STORAGE_ROOT: /app/storage
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;
      AZURE_CONTAINER_NAME: ${AZURE_CONTAINER_NAME}
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN}

      OTEL_SERVICE_NAME: backend
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"

      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none

      OTEL_RESOURCE_ATTRIBUTES: service.version=1.0.0,deployment.environment=dev
      OTEL_TRACES_SAMPLER: always_on

      AZURE_STORAGE_CONTAINER: mycontainer

      AZURE_STORAGE_CONNECTION_STRING_US: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-us:10000/devstoreaccount1;QueueEndpoint=http://azurite-us:10001/devstoreaccount1;

      AZURE_STORAGE_CONNECTION_STRING_EU: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-eu:10000/devstoreaccount1;QueueEndpoint=http://azurite-eu:10001/devstoreaccount1;

      AZURE_STORAGE_CONNECTION_STRING_ITAR: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-itar:10000/devstoreaccount1;QueueEndpoint=http://azurite-itar:10001/devstoreaccount1;

    command: ["sh", "-c", "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=172.29.0.0/16"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 20

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    depends_on:
      azurite-us:
        condition: service_healthy
      azurite-eu:
        condition: service_healthy
      azurite-itar:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector: # no health check
        condition: service_started

  azurite-us: # remove for prod
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite-us
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - ./azurite_data/us:/data
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --skipApiVersionCheck
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  azurite-eu: # remove for prod
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite-eu
    ports:
      - "10010:10000"
      - "10011:10001"
      - "10012:10002"
    volumes:
      - ./azurite_data/eu:/data
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --skipApiVersionCheck
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  azurite-itar: # remove for prod
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite-itar
    ports:
      - "10020:10000"
      - "10021:10001"
      - "10022:10002"
    volumes:
      - ./azurite_data/itar:/data
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --skipApiVersionCheck
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command:
      - "--config=/etc/otelcol/config.yaml"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    expose:
      - 4317
      - 4318
    restart: unless-stopped

  jaeger: # switch out for azure monitor in prod
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    #ports:
      #- "5432:5432"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
  
    build:
      context: .
      dockerfile: nginx/DOCKERFILE
      args:
        VITE_AZURE_TENANT_ID: ${TENANT_ID}
        VITE_AZURE_CLIENT_ID: ${CLIENT_ID}
        VITE_AZURE_API_SCOPE: ${AZURE_API_SCOPE}

    environment:
      BACKEND_URL: ${BACKEND_URL}
      BUILD_TYPE: ${BUILD_TYPE}
      
    ports:
      - "443:8443" # avoid nginx running as root  
      # Switch to 443:8443 eventually
    depends_on:
      - backend

    cap_drop: # prevent privelege escalation
      - ALL

    security_opt: # prevent privelege escalation
      - no-new-privileges:true
    volumes: 
      -  C:\certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8080"] # ["CMD", "wget", "--no-verbose", "--spider", "--no-check-certificate", "https://localhost:8443"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data: # allow db persistence across container restarts
