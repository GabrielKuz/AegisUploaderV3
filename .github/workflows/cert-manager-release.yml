name: Cert Manager Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  certbot-manager:
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.certbot-build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Compute lowercase repo
        id: repo
        run: echo "lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Certbot Manager metadata
        id: certbot-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/certbot-manager
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push certbot manager
        id: certbot-build
        uses: docker/build-push-action@v6
        with:
          context: ./Scripts/certs/Dockerfile
          push: true
          tags: ${{ steps.certbot-meta.outputs.tags }}
          labels: ${{ steps.certbot-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest certbot manager image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/certbot-manager
          subject-digest: ${{ steps.certbot-build.outputs.digest }}
          push-to-registry: true

      - name: Sign certbot manager image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/certbot-manager@${{ steps.certbot-build.outputs.digest }}"
          cosign sign --yes "$IMAGE"

      - name: Create release assets
        run: |
          mkdir -p dist
          echo "certs=${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/certbot-manager@${{ steps.certbot-build.outputs.digest }}" >> dist/images.txt
          echo "${{ github.ref_name }}" > dist/version.txt