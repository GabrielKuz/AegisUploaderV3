name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Compute lowercase repo
        id: repo
        run: echo "lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Backend metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/backend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push backend
        id: backend-build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest backend image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/backend
          subject-digest: ${{ steps.backend-build.outputs.digest }}
          push-to-registry: true

      - name: Sign backend image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/backend@${{ steps.backend-build.outputs.digest }}"
          cosign sign --yes "$IMAGE"

      - name: Nginx metadata
        id: nginx-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/nginx
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push nginx
        id: nginx-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./nginx/DOCKERFILE
          push: true
          tags: ${{ steps.nginx-meta.outputs.tags }}
          build-args: |
            VITE_AZURE_TENANT_ID=${{ secrets.TENANT_ID }}
            VITE_AZURE_CLIENT_ID=${{ secrets.CLIENT_ID }}
            VITE_AZURE_API_SCOPE=${{ secrets.AZURE_API_SCOPE }}
          labels: ${{ steps.nginx-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest nginx image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/nginx
          subject-digest: ${{ steps.nginx-build.outputs.digest }}
          push-to-registry: true

      - name: Sign nginx image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/nginx@${{ steps.nginx-build.outputs.digest }}"
          cosign sign --yes "$IMAGE"

      - name: Create release assets
        run: |
          mkdir -p dist
          echo "backend=${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/backend@${{ steps.backend-build.outputs.digest }}" > dist/images.txt
          echo "nginx=${{ env.REGISTRY }}/${{ steps.repo.outputs.lower }}/nginx@${{ steps.nginx-build.outputs.digest }}" >> dist/images.txt
          echo "${{ github.ref_name }}" > dist/version.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/images.txt
            dist/version.txt