name: Pytest

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: postgresql+psycopg://test_user:test_password@postgres:5432/test_db
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_password
  POSTGRES_DB: test_db
  TENANT_ID: test-tenant-id
  CLIENT_ID: test-client-id
  BACKEND_URL: http://backend:8000
  SECRET_KEY: test-secret-key
  TESTING: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Host diagnostics
        run: |
          cat /proc/pressure/memory || true
          cat /proc/pressure/cpu || true
          systemctl status --no-pager || true

      - name: Start Docker Compose stack
        run: docker compose -f docker-compose.ci.yml up -d --build

      - name: Wait for backend health
        run: sleep 15

      - name: Show backend logs
        run: docker compose logs backend

      - name: List tables
        run: |
          docker compose exec -T postgres psql \
            -U test_user \
            -d test_db \
            -c '\dt "LinkDB".*'

      - name: Debug containers
        run: |
          docker compose ps
          docker compose exec -T backend env | grep DATABASE_URL
          docker compose exec -T postgres pg_isready -U test_user -d test_db

      - name: Run pytest with coverage
        run: |
          docker compose exec -T backend uv run pytest \
            --cov=modules \
            --cov-report=xml

      - name: Copy coverage report
        run: |
          docker compose cp backend:/app/coverage.xml ./coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Inspect backend
        if: failure()
        run: |
          docker inspect $(docker compose ps -q backend) \
            --format='OOMKilled={{.State.OOMKilled}} ExitCode={{.State.ExitCode}}'

      - name: Tear down stack
        if: always()
        run: docker compose down -v